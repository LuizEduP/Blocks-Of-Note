<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas — Blocks of Note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../shared/toast.css">
    <link rel="stylesheet" href="../shared/auth.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .notes-page-section {
            padding-top: 56px;
            min-height: 100vh;
        }
        .notes-page-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
    </style>
</head>
<body>

    <!-- NAVEGAÇÃO SUPERIOR -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <div class="navbar-left">
                <a class="navbar-logo" href="../">
                    <span class="navbar-wordmark">&#9670; Blocks of Note</span>
                </a>
                <div class="navbar-links">
                    <a href="../notes/" class="nav-link active">Notas</a>
                    <a href="../tasks/" class="nav-link">Tarefas</a>
                    <a href="../taskboard/" class="nav-link">Taskboard</a>
                    <a href="../workspace/" class="nav-link">Workspace</a>
                </div>
            </div>
            <div class="navbar-right">
                <div id="theme-toggle-container" class="navbar-auth"></div>
                <div id="auth-google" class="navbar-auth"></div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="notes-page-section">
        <div class="notes-page-inner" role="application" aria-label="Gerenciador de Notas">

            <header class="page-header">
                <h1 class="page-title">Notas</h1>
                <div class="page-actions">
                    <button id="btn-create" class="btn btn-primary" aria-label="Criar nova nota">+ Nova Nota</button>
                    <button id="btn-remove" class="btn btn-danger" aria-label="Alternar modo de remoção">Remover</button>
                    <button id="btn-export" class="btn" aria-label="Exportar notas">Exportar</button>
                </div>
            </header>

            <div class="notes-controls">
                <div class="notes-search-wrapper">
                    <span class="notes-search-icon">🔍</span>
                    <input type="text" id="notes-search-input" class="input notes-search-input" placeholder="Buscar notas por título ou conteúdo..." aria-label="Buscar notas pelo título ou conteúdo">
                </div>
                <span id="notes-stats" class="notes-stats" aria-live="polite">0 notas</span>
            </div>

            <div id="search-announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>

            <div id="notes-grid" class="notes-grid" role="list" aria-label="Lista de notas">
                <!-- Renderizado via JS -->
            </div>

        </div>
    </div>

    <!-- Modal de edição -->
    <div id="note-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Editor de nota">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-top">
                    <input type="text" id="note-title-input" placeholder="Sem título" maxlength="200" aria-label="Título da nota" class="modal-title-input">
                    <button id="btn-modal-close" class="modal-close-btn" aria-label="Fechar editor">✕</button>
                </div>
                <div class="modal-header-meta">
                    <span class="modal-date">Criado em: <span id="note-date-display">--/--</span></span>
                    <span class="modal-char-count" id="note-char-count">0 caracteres</span>
                </div>
            </div>

            <div class="divider" aria-hidden="true"></div>

            <textarea id="note-text" placeholder="Comece a escrever sua ideia... Use **negrito**, *itálico* e listas normalmente." maxlength="5000" aria-label="Conteúdo da nota" class="modal-textarea"></textarea>

            <div class="modal-footer">
                <div class="modal-footer-left">
                    <span class="modal-tip">Dica: Enter para nova linha · Esc para fechar</span>
                </div>
                <div class="modal-footer-right">
                    <button id="btn-cancel" class="btn" aria-label="Descartar alterações">Descartar</button>
                    <button id="btn-save" class="btn btn-primary" aria-label="Salvar nota">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/theme.js"></script>
    <script src="../shared/friends.js"></script>
    <script src="../shared/chat-widget.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="../shared/toast.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="../shared/supabase.js"></script>
    <script src="../shared/auth-supabase.js"></script>
    <script src="../shared/notes-storage-supabase.js"></script>
    <script src="../shared/chat-storage-supabase.js"></script>
    <script src="../shared/profiles-sync.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            var navbar = document.getElementById('navbar');
            if (navbar) navbar.classList.add('visible');
            Auth.init();
            Theme.init();
            Friends.init();
            ChatWidget.init();
            Auth.renderButton('auth-google');
            if (typeof NotesStorage?.init === 'function') NotesStorage.init();
            ProfilesSync.syncMyProfile();
        });
    </script>
</body>
</html>
