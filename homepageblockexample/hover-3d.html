<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cubo Wireframe e Rastro Cinza</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; /* Fundo Branco */
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // Fundo Branco

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 7;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        // 1. Cubo sem face com bordas pretas
        const size = 5;
        const boxGeometry = new THREE.BoxGeometry(size, size, size);
        const edgesGeometry = new THREE.EdgesGeometry(boxGeometry);
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const wireframeCube = new THREE.LineSegments(edgesGeometry, edgesMaterial);
        group.add(wireframeCube);

        // 2. Grid de quadradinhos invisíveis
        const cubes = [];
        const resolution = 12; // Quantidade de blocos (12x12x12)
        const step = size / resolution;
        const miniCubeGeo = new THREE.BoxGeometry(step * 0.9, step * 0.9, step * 0.9);

        for(let x = 0; x < resolution; x++) {
            for(let y = 0; y < resolution; y++) {
                for(let z = 0; z < resolution; z++) {
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0x555555, // Cinza escuro
                        transparent: true,
                        opacity: 0,
                        depthWrite: false // Evita bugs visuais na transparência
                    });
                    const mesh = new THREE.Mesh(miniCubeGeo, mat);
                    
                    mesh.position.set(
                        x * step - size/2 + step/2,
                        y * step - size/2 + step/2,
                        z * step - size/2 + step/2
                    );
                    group.add(mesh);
                    cubes.push(mesh);
                }
            }
        }

        // 3. Sistema de Interação
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let lastHovered = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubes);

            if (intersects.length > 0) {
                const currentHover = intersects[0].object;

                // Se o mouse mudou para um novo quadradinho
                if (lastHovered && lastHovered !== currentHover) {
                    // Transforma o anterior em cinza claro e faz sumir devagar
                    gsap.to(lastHovered.material.color, { r: 0.8, g: 0.8, b: 0.8, duration: 0.2 }); // #cccccc (Cinza claro)
                    gsap.to(lastHovered.material, { opacity: 0, duration: 1.5 });
                }

                // O quadradinho atual fica cinza escuro e 100% visível imediatamente
                gsap.killTweensOf(currentHover.material);
                gsap.killTweensOf(currentHover.material.color);
                
                currentHover.material.color.setRGB(0.33, 0.33, 0.33); // #555555 (Cinza escuro)
                currentHover.material.opacity = 1;

                lastHovered = currentHover;
            } else if (lastHovered) {
                // Mouse saiu de todos os cubos
                gsap.to(lastHovered.material.color, { r: 0.8, g: 0.8, b: 0.8, duration: 0.2 });
                gsap.to(lastHovered.material, { opacity: 0, duration: 1.5 });
                lastHovered = null;
            }
        });

        // Loop para girar o cubo devagar
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.x += 0.002;
            group.rotation.y += 0.003;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
