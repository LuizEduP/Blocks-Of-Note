<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Notas - 3D</title>
    <link rel="stylesheet" href="paginanot.css">
</head>
<body>

    <div class="wrapper" id="noteWrapper">
        <div class="main-container" id="main-container">
            
            <div class="scene" id="scene-center">
                <div class="cube" id="cube-main-note">
                    <div class="face front">NOTAS</div>
                    <div class="face back">NOTAS</div>
                    <div class="face right">NOTAS</div>
                    <div class="face left">NOTAS</div>
                    <div class="face top">NOTAS</div>
                    <div class="face bottom">NOTAS</div>
                </div>
            </div>

            <div class="menu-options">
                <div class="opt-btn btn-top" id="btn-create">CRIAR</div>
                <div class="opt-btn btn-bottom" id="btn-remove">REMOVER</div>
            </div>
        </div>

        <div id="notes-orbit"></div>
    </div>

    <script src="paginanot.js"></script>
</body>
</html>
