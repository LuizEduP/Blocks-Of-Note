<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Cubo 3D</title>
    <link rel="stylesheet" href="shared/base.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-overlay" role="dialog" aria-modal="true" aria-label="Apresentação Blocks of Note">
        <div class="intro-box">
            <span class="word" aria-hidden="true">BLOCKS</span>
            <div class="cube-slot" aria-hidden="true"></div>
            <span class="word" aria-hidden="true">F NOTES</span>
        </div>
    </div>

    <div class="wrapper" id="menuWrapper" role="navigation" aria-label="Menu principal">
        
        <div class="scene scene-side" id="scene-left">
            <a href="paginanot.html" class="cube-link" aria-label="Abrir página de Notas">
                <div class="cube" id="cube-left">
                    <div class="face front"></div>
                    <div class="face back"></div>
                    <div class="face right"></div>
                    <div class="face left"></div>
                    <div class="face top"></div>
                    <div class="face bottom"></div>
                </div>
            </a>
            <div class="cube-name" aria-hidden="true">NOTAS</div>
        </div>

        <div class="scene" id="scene-main">
            <div class="cube" id="cube-main" role="button" aria-label="Abrir menu principal" tabindex="0">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
        </div>

        <div class="scene scene-side" id="scene-right">
            <a href="paginatask.html" class="cube-link" aria-label="Abrir página de Tarefas">
                <div class="cube" id="cube-right">
                    <div class="face front"></div>
                    <div class="face back"></div>
                    <div class="face right"></div>
                    <div class="face left"></div>
                    <div class="face top"></div>
                    <div class="face bottom"></div>
                </div>
            </a>
            <div class="cube-name" aria-hidden="true">TAREFAS</div>
        </div>
    </div>

    <script src="homepage.js"></script>
</body>
</html>
